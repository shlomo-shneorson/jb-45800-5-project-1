<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <script defer src="app.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body
    onload="
      getNav();
      loadData();
    "
  >
    <header>
      <h1 class="p-4">Filters</h1>
      <nav></nav>
    </header>
    <div class="container">
      <section class="d-flex justify-content-center">
        <form
          onsubmit="filterExpense(event)"
          class="d-flex gap-3 p-4 m-3"
          action=""
        >
          <div>
            <label class="form-label fst-italic" for="yearsFilter"
              >Years:</label
            >
            <input
              class="form-control"
              max="2026"
              id="yearsFilter"
              type="number"
              step="1"
              placeholder="Y-Y-Y-Y"
              minlength="4"
              maxlength="4"
            />
          </div>
          <div class="">
            <label class="form-label fst-italic" for="monthFilter"
              >Month:</label
            >

            <input
              min="1"
              max="12"
              class="form-control"
              id="monthFilter"
              type="number"
              step="1"
              minlength="2"
              maxlength="2"
              placeholder="M-M"
            />
          </div>
          <div>
            <label class="form-label fst-italic" for="dayFilter">Day:</label>
            <input
              class="form-control"
              id="dayFilter"
              min="1"
              max="31"
              type="number"
              step="1"
              minlength="2"
              minlength="2"
              placeholder="D-D"
            />
          </div>
          <div class="d-flex flex-column">
            <label
              style="text-wrap: nowrap"
              class="form-label"
              for="hightFilter"
              >Max:</label
            >
            <input
              min="1"
              class="form-control"
              id="hightFilter"
              type="number"
              step="1"
              placeholder="hight.."
            />
          </div>
          <button type="submit" class="btn btn-outline-light">Filter</button>
        </form>
      </section>
      <section>
        <section class="mt-4">
          <h5 class="fst-italic text-center border-bottom">Expenses Table</h5>
          <table class="table table-striped table-bordered">
            <thead>
              <th>category</th>
              <th>discription</th>
              <th>high</th>
              <th>date</th>
            </thead>
            <tbody id="tableOfFilter"></tbody>
          </table>
        </section>
      </section>
    </div>
    <footer class="m-0">
      <p class="p-4 justify-content-center m-0 align-items-center">
        Copyright © 2026 john brise. All rights reserved.
      </p>
    </footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
