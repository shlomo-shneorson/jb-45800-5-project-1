<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <link rel="stylesheet" href="style.css" />
    <script defer src="app.js"></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/5.0.2/jspdf.plugin.autotable.min.js"
      integrity="sha512-JizZOUNesiGhMcp9fsA/9W31FOat6QysBM8hSj6ir8iIANIUJ2mhko7Lo1+j0ErftmJ8SebMZLm9iielKjeIEQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/3.0.3/jspdf.umd.min.js"
      integrity="sha512-+EeCylkt9WHJk5tGJxYdecHOcXFRME7qnbsfeMsdQL6NUPYm2+uGFmyleEqsmVoap/f3dN/sc3BX9t9kHXkHHg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
  </head>
  <body
    class="min-vh-100"
    onload="
      getNav();
      loadData();
    "
  >
    <header>
      <h1 class="p-4">Home</h1>
      <nav class=""></nav>
    </header>
    <div class="container">
      <section class="mt-4 d-flex justify-content-center">
        <form
          class="mt-4 mb-5 p-5 col-12 col-md-6"
          onsubmit="addExpense(event)"
          action=""
        >
          <h2 class="text-center border-bottom pt-3">Expense Details</h2>
          <label class="form-label fst-italic border-bottom" for="category"
            >category</label
          >
          <select required class="form-select" name="" id="categoryOfExpense">
            <option value="" disabled selected>select category...</option>
            <option value="food">food</option>
            <option value="fuel">fuel</option>
            <option value="leisure">leisure</option>
            <option value="authorities">authorities</option>
            <option value="other">other..</option>
          </select>
          <label
            class="form-label mt-3 fst-italic border-bottom"
            for="discrioption"
            >discrioption</label
          >
          <textarea
            name=""
            class="form-control"
            rows="3"
            id="discrioptionOfExpense"
          ></textarea>
          <label
            class="form-label fst-italic border-bottom mt-3"
            min="1"
            max="100000"
            for="hight"
            >hight</label
          ><input
            required
            min="0"
            max="100000"
            class="form-control"
            type="number"
            id="hightOfExpense"
          /><label class="form-label fst-italic border-bottom mt-3" for="date"
            >date</label
          ><input
            required
            class="form-control"
            type="date"
            id="dateOfExpense"
          />
          <button
            id="btnForAdd"
            type="submit"
            class="btn btn-outline-light mb-3 w-100 mt-4"
          >
            add
          </button>
        </form>
      </section>
      <section>
        <h5 class="fst-italic text-center border-bottom">Expenses Table</h5>
        <table class="table table-striped table-bordered">
          <thead>
            <th>category</th>
            <th>discription</th>
            <th>high</th>
            <th>date</th>
          </thead>
          <tbody id="tableOfExpense"></tbody>
        </table>
      </section>
    </div>

    <footer class="m-0">
      <p class="p-4 justify-content-center m-0 align-items-center">
        Copyright © 2026 john brise. All rights reserved.
      </p>
    </footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
